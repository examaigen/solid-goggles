<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prisijungti – Exam Prep</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded shadow w-full max-w-sm">
    <h1 class="text-2xl mb-4 font-bold">Prisijunkite</h1>
    <form id="login-form" class="space-y-4">
      <input
        id="email-input"
        type="email"
        placeholder="El. paštas"
        class="w-full border p-2 rounded"
        required
      />
      <input
        id="password-input"
        type="password"
        placeholder="Slaptažodis"
        class="w-full border p-2 rounded"
        required
      />
      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded"
      >
        Prisijungti
      </button>
    </form>
    <p id="login-error" class="mt-2 text-red-500"></p>

    <!-- Register button -->
    <div class="mt-6 text-center">
      <span class="text-gray-600">Dar neturite paskyros?</span>
      <a
        href="register.html"
        class="inline-block ml-2 px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700"
      >
        Registruotis
      </a>
    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
